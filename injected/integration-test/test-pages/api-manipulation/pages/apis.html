<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Webcompat shims</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
    <script src="../../shared/utils.js"></script>
    <p><a href="../index.html">[Webcompat shims]</a></p>

    <p>This page verifies that APIs get modified</p>

    <script>
        test('API removal', async () => {
            return [
                {
                    name: "APIs removal",
                    result: navigator.userAgent,
                    expected: undefined
                },
                {
                    name: "New API definition deletion does nothing",
                    result: navigator.thisDoesNotExist,
                    expected: undefined
                },
            ];
        });

        test('Existing API modified', async () => {
            const hardwareConcurrencyGetter = Object.getOwnPropertyDescriptor(Navigator.prototype, 'hardwareConcurrency').get;
            return [
                {
                    name: "New API definition doesn't work",
                    result: navigator.newAPI,
                    expected: undefined
                },
                {
                    name: "APIs modified",
                    result: navigator.hardwareConcurrency,
                    expected: 222
                },
                {
                    name: "Returns expected value",
                    result: window.name,
                    expected: "newName"
                },
                {
                    name: "Defaults to configurable",
                    result: Object.getOwnPropertyDescriptor(window, 'name').configurable,
                    expected: true
                },
                {
                    name: "Defaults to enumerable",
                    result: Object.getOwnPropertyDescriptor(window, 'name').enumerable,
                    expected: true
                },
                {
                    name: "Getter toString is masked against original DOM getter",
                    result: hardwareConcurrencyGetter.toString(),
                    expected: "function get hardwareConcurrency() { [native code] }"
                },
                {
                    name: "Getter toString.toString is native-like",
                    result: hardwareConcurrencyGetter.toString.toString(),
                    expected: Function.prototype.toString.toString()
                }
            ]
        });


        test('Validate all expected APIs can be removed', async () => {
            // These APIs might not exist in all browsers however we should ensure they are removed after the code runs
            const result = []
            const APIs = [
                navigator.joinAdInterestGroup,
                navigator.leaveAdInterestGroup,
                navigator.clearOriginJoinedAdInterestGroups,
                navigator.updateAdInterestGroups,
                navigator.createAuctionNonce,
                navigator.runAdAuction,
                navigator.adAuctionComponents,
                navigator.deprecatedURNToURL,
                navigator.deprecatedReplaceInURN,
                navigator.getInterestGroupAdAuctionData,
                navigator.createAdRequest,
                navigator.finalizeAd,
                navigator.canLoadAdAuctionFencedFrame,
                navigator.deprecatedRunAdAuctionEnforcesKAnonymity,
                navigator.protectedAudience,
            ]
            APIs.forEach(api => {
                result.push({
                    name: `API ${api} removed`,
                    result: api,
                    expected: undefined
                });
            });
            return result;
        });

        test('Define property with define: true', async () => {
            return [
                {
                    name: "Property defined by config (define: true)",
                    result: window.definedByConfig,
                    expected: "defined!"
                },
                {
                    name: "Property not defined by config (define not set)",
                    result: window.notDefinedByConfig,
                    expected: undefined
                }
            ];
        });

        test('Descriptor target semantics', async () => {
            const syntheticMethodDescriptor = Object.getOwnPropertyDescriptor(window, 'syntheticMethodByTarget');
            return [
                {
                    name: "Property defined by target: missing",
                    result: window.definedByTarget,
                    expected: "defined by target"
                },
                {
                    name: "Synthetic value descriptor returns configured function value",
                    result: window.syntheticMethodByTarget(),
                    expected: undefined
                },
                {
                    name: "Synthetic value descriptor toString is native-like",
                    result: syntheticMethodDescriptor.value.toString(),
                    expected: "function syntheticMethodByTarget() { [native code] }"
                },
                {
                    name: "Raw inherited descriptor skipped by default",
                    result: Object.prototype.hasOwnProperty.call(MediaDevices.prototype, 'dispatchEvent'),
                    expected: false
                },
                {
                    name: "Explicit target: existing shadows inherited descriptor",
                    result: Object.prototype.hasOwnProperty.call(MediaDevices.prototype, 'addEventListener'),
                    expected: true
                },
                {
                    name: "Explicit target: existing applies configured method",
                    result: navigator.mediaDevices.addEventListener('devicechange', () => {}),
                    expected: undefined
                }
            ];
        });

        test('MediaDevices service area', async () => {
            return [
                {
                    name: "Service area shadows inherited removeEventListener",
                    result: Object.prototype.hasOwnProperty.call(MediaDevices.prototype, 'removeEventListener'),
                    expected: true
                },
                {
                    name: "Service area noops removeEventListener",
                    result: navigator.mediaDevices.removeEventListener('devicechange', () => {}),
                    expected: undefined
                },
                {
                    name: "Service area overrides ondevicechange getter",
                    result: navigator.mediaDevices.ondevicechange,
                    expected: undefined
                },
                {
                    name: "Service area overrides ondevicechange setter",
                    result: (() => {
                        navigator.mediaDevices.ondevicechange = () => {};
                        return navigator.mediaDevices.ondevicechange;
                    })(),
                    expected: undefined
                }
            ];
        });

        // eslint-disable-next-line no-undef
        renderResults();
    </script>
</body>
</html>
