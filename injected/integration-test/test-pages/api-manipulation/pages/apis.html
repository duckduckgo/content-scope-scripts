<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Webcompat shims</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
    <script src="../../shared/utils.js"></script>
    <p><a href="../index.html">[Webcompat shims]</a></p>

    <p>This page verifies that APIs get modified</p>

    <script>
        test('API removal', async () => {
            return [
                {
                    name: "APIs removal",
                    result: navigator.userAgent,
                    expected: undefined
                },
                {
                    name: "New API definition deletion does nothing",
                    result: navigator.thisDoesNotExist,
                    expected: undefined
                },
            ];
        });

        test('Existing API modified', async () => {
            return [
                {
                    name: "New API definition doesn't work",
                    result: navigator.newAPI,
                    expected: undefined
                },
                {
                    name: "APIs modified",
                    result: navigator.hardwareConcurrency,
                    expected: 222
                },
                {
                    name: "Returns expected value",
                    result: window.name,
                    expected: "newName"
                },
                {
                    name: "Defaults to configurable",
                    result: Object.getOwnPropertyDescriptor(window, 'name').configurable,
                    expected: true
                },
                {
                    name: "Defaults to enumerable",
                    result: Object.getOwnPropertyDescriptor(window, 'name').enumerable,
                    expected: true
                }
            ]
        });


        test('Validate all expected APIs can be removed', async () => {
            // These APIs might not exist in all browsers however we should ensure they are removed after the code runs
            const result = []
            const APIs = [
                navigator.joinAdInterestGroup,
                navigator.leaveAdInterestGroup,
                navigator.clearOriginJoinedAdInterestGroups,
                navigator.updateAdInterestGroups,
                navigator.createAuctionNonce,
                navigator.runAdAuction,
                navigator.adAuctionComponents,
                navigator.deprecatedURNToURL,
                navigator.deprecatedReplaceInURN,
                navigator.getInterestGroupAdAuctionData,
                navigator.createAdRequest,
                navigator.finalizeAd,
                navigator.canLoadAdAuctionFencedFrame,
                navigator.deprecatedRunAdAuctionEnforcesKAnonymity,
                navigator.protectedAudience,
            ]
            APIs.forEach(api => {
                result.push({
                    name: `API ${api} removed`,
                    result: api,
                    expected: undefined
                });
            });
            return result;
        });

        test('Spoofed getter looks native', async () => {
            // Both .toString() paths on a wrapped descriptor's getter should report native syntax
            // (containing "[native code]") so the spoof cannot be trivially detected via stringification.
            const desc = Object.getOwnPropertyDescriptor(Navigator.prototype, 'hardwareConcurrency');
            const getter = desc && desc.get;
            return [
                {
                    name: "Wrapped descriptor still exposes a getter",
                    result: typeof getter === 'function',
                    expected: true,
                },
                {
                    name: "Wrapped getter still returns the spoofed value",
                    result: navigator.hardwareConcurrency,
                    expected: 222,
                },
                {
                    name: "getter.toString() reports [native code]",
                    result: typeof getter === 'function' && getter.toString().includes('[native code]'),
                    expected: true,
                },
                {
                    name: "Function.prototype.toString.call(getter) reports [native code]",
                    result: typeof getter === 'function' && Function.prototype.toString.call(getter).includes('[native code]'),
                    expected: true,
                },
                {
                    name: "getter.toString() does NOT leak the C-S-S arrow source",
                    result: typeof getter === 'function' && !getter.toString().includes('processAttr'),
                    expected: true,
                },
                {
                    name: "Function.prototype.toString.call(getter) does NOT leak the C-S-S arrow source",
                    result: typeof getter === 'function' && !Function.prototype.toString.call(getter).includes('processAttr'),
                    expected: true,
                },
            ];
        });

        test('Define property with define: true', async () => {
            return [
                {
                    name: "Property defined by config (define: true)",
                    result: window.definedByConfig,
                    expected: "defined!"
                },
                {
                    name: "Property not defined by config (define not set)",
                    result: window.notDefinedByConfig,
                    expected: undefined
                }
            ];
        });

        // eslint-disable-next-line no-undef
        renderResults();
    </script>
</body>
</html>
