<!DOCTYPE html>
<html style="overflow: hidden; height: 100%;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen App - Browser UI Lock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        .app { height: 100%; display: flex; align-items: center; justify-content: center; background: #1a1a2e; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="app">
        <p>Fullscreen app — no scrollbar, UI should be locked.</p>
    </div>
</body>
</html>
