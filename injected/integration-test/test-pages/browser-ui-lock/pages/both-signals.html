<!DOCTYPE html>
<html style="overflow: hidden; overscroll-behavior: none; height: 100%;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Both Signals - Browser UI Lock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        .content { padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="content">
        <p><a href="../index.html">[Browser UI Lock]</a></p>

        <h1>Both Signals: overflow hidden + overscroll none</h1>
        <p>This page has <code>overflow: hidden</code> and <code>overscroll-behavior: none</code>
           on both html and body, with content that fits the viewport.</p>
        <p>The browser UI should be <strong>LOCKED</strong> because there is no visible scrollbar.</p>

        <div id="results"></div>
        <div id="test-status"></div>
    </div>

    <script src="../../shared/utils.js"></script>
    <script>
        test('Page should lock (no visible scrollbar)', async () => {
            await new Promise(resolve => setTimeout(resolve, 500));

            const html = document.documentElement;
            const body = document.body;
            const htmlStyle = getComputedStyle(html);
            const bodyStyle = getComputedStyle(body);

            const htmlHasScrollbar = html.scrollHeight > html.clientHeight
                && htmlStyle.overflowY !== 'hidden'
                && htmlStyle.overflowY !== 'clip';
            const bodyHasScrollbar = body.scrollHeight > body.clientHeight
                && bodyStyle.overflowY !== 'hidden'
                && bodyStyle.overflowY !== 'clip';

            return [
                {
                    name: 'HTML overflow is hidden',
                    result: htmlStyle.overflowY,
                    expected: 'hidden'
                },
                {
                    name: 'Body overflow is hidden',
                    result: bodyStyle.overflowY,
                    expected: 'hidden'
                },
                {
                    name: 'No visible scrollbar on html or body',
                    result: !htmlHasScrollbar && !bodyHasScrollbar,
                    expected: true
                }
            ];
        });

        renderResults();
    </script>
</body>
</html>
