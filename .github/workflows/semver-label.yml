name: Semver Label

on:
    pull_request_target:
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    pull-requests: write

jobs:
    semver_label:
        if: startsWith(github.event.pull_request.head.ref, 'release-')
        runs-on: ubuntu-latest

        steps:
            - name: Checkout base branch
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.base.ref }}
                  path: base

            - name: Checkout PR branch
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  path: pr
                  fetch-depth: 0

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: 'base/.nvmrc'

            - name: Build base branch
              run: |
                  cd base
                  npm install
                  npm run build

            - name: Build PR branch
              env:
                  BASE_REF: ${{ github.event.pull_request.base.ref }}
              run: |
                  cd pr
                  git config --global user.email "dax@duck.com"
                  git config --global user.name "dax"
                  git fetch origin "$BASE_REF"
                  git rebase -X theirs "origin/$BASE_REF"
                  npm install
                  npm run build

            - name: Create build diff
              run: |
                  node base/.github/scripts/diff-directories.js base pr > /tmp/build_diff.txt

            - name: Get PR source files
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > /tmp/pr_files.txt 2>/dev/null || true

            - name: Run semver analysis
              id: analyse
              env:
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_BODY: ${{ github.event.pull_request.body }}
              run: |
                  export BUILD_DIFF="$(cat /tmp/build_diff.txt 2>/dev/null || echo '')"
                  export PR_FILES="$(cat /tmp/pr_files.txt 2>/dev/null || echo '')"

                  RESULT=$(node base/.github/scripts/semver-analysis.mjs)
                  echo "Raw result: $RESULT"

                  SEVERITY=$(echo "$RESULT" | jq -r '.severity')
                  echo "severity=$SEVERITY" >> "$GITHUB_OUTPUT"

            - name: Label PR
              if: steps.analyse.outputs.severity != ''
              uses: actions/github-script@v8
              env:
                  SEVERITY: ${{ steps.analyse.outputs.severity }}
              with:
                  script: |
                      const prNumber = context.payload.pull_request.number;
                      const label = process.env.SEVERITY;
                      const semverLabels = ['major', 'minor', 'patch'];

                      const labelColors = { major: 'B60205', minor: 'FBCA04', patch: '0E8A16' };
                      const labelDescriptions = {
                          major: 'Breaking change — triggers major version bump',
                          minor: 'New feature — triggers minor version bump',
                          patch: 'Bug fix / internal — no release needed'
                      };

                      try {
                          await github.rest.issues.getLabel({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              name: label
                          });
                      } catch {
                          await github.rest.issues.createLabel({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              name: label,
                              color: labelColors[label],
                              description: labelDescriptions[label]
                          });
                      }

                      const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: prNumber
                      });
                      for (const l of currentLabels) {
                          if (semverLabels.includes(l.name) && l.name !== label) {
                              await github.rest.issues.removeLabel({
                                  owner: context.repo.owner,
                                  repo: context.repo.repo,
                                  issue_number: prNumber,
                                  name: l.name
                              });
                          }
                      }

                      await github.rest.issues.addLabels({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: prNumber,
                          labels: [label]
                      });
                      console.log(`Applied label: ${label}`);
