name: Cursor Auto Review

on:
    pull_request_target:
        types: [opened, synchronize, reopened]

jobs:
    cursor_auto_review:
        runs-on: ubuntu-latest
        concurrency: cursor-review-${{ github.event.pull_request.number }}

        steps:
            - name: Verify author is in duckduckgo/core
              uses: actions/github-script@v8
              with:
                  github-token: ${{ secrets.DAX_PAT }}
                  script: |
                      const author = context.payload.pull_request.user.login;
                      try {
                          const { data } = await github.rest.teams.getMembershipForUserInOrg({
                              org: 'duckduckgo',
                              team_slug: 'core',
                              username: author
                          });
                          if (data.state === 'active') {
                              console.log(`✅ ${author} is an active member of duckduckgo/core`);
                          } else {
                              core.setFailed(`${author} is not an active member of duckduckgo/core`);
                          }
                      } catch (error) {
                          core.setFailed(`${author} is not a member of duckduckgo/core`);
                      }

            - name: Dismiss stale Dax approval on new push
              if: github.event.action == 'synchronize'
              uses: actions/github-script@v8
              with:
                  github-token: ${{ secrets.DAX_PAT }}
                  script: |
                      const { data: reviews } = await github.rest.pulls.listReviews({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: context.payload.pull_request.number
                      });

                      for (const review of reviews) {
                          if (review.state === 'APPROVED' && review.user.login === 'daxtheduck') {
                              await github.rest.pulls.dismissReview({
                                  owner: context.repo.owner,
                                  repo: context.repo.repo,
                                  pull_number: context.payload.pull_request.number,
                                  review_id: review.id,
                                  message: 'Dismissing stale approval — new commits pushed, awaiting Cursor re-review.'
                              });
                              console.log(`Dismissed stale approval (review ${review.id})`);
                          }
                      }

            - name: Checkout base branch
              uses: actions/checkout@v6
              with:
                  sparse-checkout: .github/REQUIRED_TEAMS
                  sparse-checkout-cone-mode: false

            - name: Debounce delay
              run: sleep 5

            - name: Wait for Cursor Bugbot
              uses: fountainhead/action-wait-for-check@v1.2.0
              id: wait-for-cursor
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  checkName: Cursor Bugbot
                  ref: ${{ github.event.pull_request.head.sha }}
                  timeoutSeconds: 600

            - name: Check Cursor Bugbot risk assessment
              if: steps.wait-for-cursor.outputs.conclusion == 'success'
              uses: actions/github-script@v8
              id: risk_check
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const sha = context.payload.pull_request.head.sha;
                      let riskLevel = null;

                      const riskPattern = /\*\*(Low|Medium|High|Critical)\s+Risk\*\*/i;

                      const { data: checkRuns } = await github.rest.checks.listForRef({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          ref: sha,
                          check_name: 'Cursor Bugbot'
                      });

                      for (const run of checkRuns.check_runs) {
                          const text = [run.output?.title, run.output?.summary, run.output?.text].join('\n');
                          const match = text.match(riskPattern);
                          if (match) {
                              riskLevel = match[1];
                              break;
                          }
                      }

                      if (!riskLevel) {
                          const { data: reviews } = await github.rest.pulls.listReviews({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              pull_number: context.payload.pull_request.number
                          });
                          for (const review of reviews) {
                              const match = review.body?.match(riskPattern);
                              if (match) {
                                  riskLevel = match[1];
                                  break;
                              }
                          }
                      }

                      if (!riskLevel) {
                          const { data: comments } = await github.rest.issues.listComments({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.payload.pull_request.number
                          });
                          for (const comment of comments) {
                              const match = comment.body?.match(riskPattern);
                              if (match) {
                                  riskLevel = match[1];
                                  break;
                              }
                          }
                      }

                      console.log(`Cursor Bugbot risk level: ${riskLevel ?? 'not found'}`);
                      core.setOutput('risk_level', riskLevel ?? 'unknown');
                      core.setOutput('is_low_risk', riskLevel?.toLowerCase() === 'low');

            - name: Check for existing Dax approval
              uses: actions/github-script@v8
              id: check_reviews
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const { data: reviews } = await github.rest.pulls.listReviews({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: context.payload.pull_request.number
                      });

                      const hasApprovedReview = reviews.some(review =>
                          review.state === 'APPROVED' &&
                          review.user.login === 'daxtheduck'
                      );

                      console.log(`Found approved review from daxtheduck: ${hasApprovedReview}`);
                      core.setOutput('has_approved_review', hasApprovedReview);

            - name: Auto approve
              if: |
                  steps.wait-for-cursor.outputs.conclusion == 'success' &&
                  steps.risk_check.outputs.is_low_risk == 'true' &&
                  steps.check_reviews.outputs.has_approved_review == 'false'
              run: gh pr review --approve "$PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GITHUB_TOKEN: ${{ secrets.DAX_PAT }}

            - name: Find previous review comment
              if: |
                  steps.wait-for-cursor.outputs.conclusion != 'success' ||
                  steps.risk_check.outputs.is_low_risk != 'true'
              uses: peter-evans/find-comment@v4
              id: find_comment
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-author: 'github-actions[bot]'
                  body-includes: 'requires a manual review'
                  direction: last

            - name: Post manual review required comment
              if: |
                  (steps.wait-for-cursor.outputs.conclusion != 'success' ||
                  steps.risk_check.outputs.is_low_risk != 'true') &&
                  steps.find_comment.outputs.comment-id == ''
              uses: actions/github-script@v8
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const fs = require('fs');
                      const teams = fs.readFileSync('.github/REQUIRED_TEAMS', 'utf8').trim().split('\n').filter(Boolean);
                      const teamList = teams.map(t => `- @duckduckgo/${t}`).join('\n');

                      const cursorPassed = '${{ steps.wait-for-cursor.outputs.conclusion }}' === 'success';
                      const riskLevel = '${{ steps.risk_check.outputs.risk_level }}';

                      let reason;
                      if (!cursorPassed) {
                          reason = 'Cursor review was not successful.';
                      } else {
                          reason = `Cursor assessed this PR as **${riskLevel} Risk** (only Low Risk is auto-approved).`;
                      }

                      await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.pull_request.number,
                          body: `⚠️ ${reason}\n\nThis PR requires a manual review and approval from a member of one of the following teams:\n\n${teamList}`
                      });
