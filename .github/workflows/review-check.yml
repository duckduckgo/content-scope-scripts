name: Review Validation

on:
    pull_request_review:
        types: [submitted, dismissed]
    pull_request_target:
        types: [opened, synchronize, reopened]

permissions:
    actions: write
    contents: read
    pull-requests: read

jobs:
    review_validation:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout base branch
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.base.ref }}
                  sparse-checkout: |
                      .github/REQUIRED_TEAMS
                      .github/scripts
                  sparse-checkout-cone-mode: false

            - name: Validate approved review from authorized reviewer
              uses: actions/github-script@v8
              env:
                  ORG_TOKEN: ${{ secrets.DAX_PAT }}
              with:
                  script: |
                      const { loadRequiredTeams, findAuthorizedApproval } = await import(`${process.cwd()}/.github/scripts/review-helpers.mjs`);
                      const teams = loadRequiredTeams();

                      let approval;
                      try {
                          approval = await findAuthorizedApproval(github, {
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              prNumber: context.payload.pull_request.number,
                              org: 'duckduckgo',
                              teams,
                              orgToken: process.env.ORG_TOKEN || undefined
                          });
                      } catch (error) {
                          if (error.status === 401) {
                              core.setFailed('DAX_PAT returned 401 — token may be expired or misconfigured');
                          } else {
                              core.setFailed(`Review validation failed: ${error.message} (status: ${error.status ?? 'unknown'})`);
                          }
                          return;
                      }

                      if (approval) {
                          const via = approval.team ? `(member of ${approval.team})` : '';
                          console.log(`✅ Approved by ${approval.user} ${via}`);
                      } else {
                          core.setFailed(
                              '❌ No approved review from daxtheduck or a member of the required teams: ' +
                              teams.map(t => `@duckduckgo/${t}`).join(', ')
                          );
                      }

            - name: Re-run stale failed checks
              if: success() && github.event_name == 'pull_request_review'
              uses: actions/github-script@v8
              with:
                  script: |
                      const headBranch = context.payload.pull_request.head.ref;
                      const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          workflow_id: 'review-check.yml',
                          branch: headBranch,
                          event: 'pull_request_target',
                          per_page: 5
                      });

                      const failed = runs.find(r => r.conclusion === 'failure');
                      if (!failed) {
                          console.log('No stale failed pull_request_target runs found');
                          return;
                      }

                      try {
                          await github.rest.actions.reRunWorkflowFailedJobs({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              run_id: failed.id
                          });
                          console.log(`Re-triggered run #${failed.run_number} (${failed.id})`);
                      } catch (err) {
                          console.log(`Could not re-run: ${err.message}`);
                      }
