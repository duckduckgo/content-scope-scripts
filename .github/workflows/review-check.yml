name: Review Validation

on:
    pull_request_review:
        types: [submitted, dismissed]
    pull_request_target:
        types: [opened, synchronize, reopened]
    merge_group:

permissions:
    contents: read
    pull-requests: read

jobs:
    review_validation:
        runs-on: ubuntu-latest

        steps:
            - name: Merge queue pass-through
              if: ${{ github.event_name == 'merge_group' }}
              run: echo "Review already validated before entering merge queue"

            - name: Checkout base branch
              if: ${{ github.event_name != 'merge_group' }}
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.base.ref }}
                  sparse-checkout: |
                      .github/REQUIRED_TEAMS
                      .github/scripts
                  sparse-checkout-cone-mode: false

            - name: Validate approved review from authorized reviewer
              if: ${{ github.event_name != 'merge_group' }}
              uses: actions/github-script@v8
              env:
                  ORG_TOKEN: ${{ secrets.DAX_PAT }}
              with:
                  script: |
                      const { loadRequiredTeams, findAuthorizedApproval } = await import(`${process.cwd()}/.github/scripts/review-helpers.mjs`);
                      const teams = loadRequiredTeams();
                      const repo = { owner: context.repo.owner, repo: context.repo.repo };
                      const teamsList = teams.map(t => `@duckduckgo/${t}`).join(', ');

                      let approval;
                      try {
                          approval = await findAuthorizedApproval(github, {
                              ...repo,
                              prNumber: context.payload.pull_request.number,
                              org: 'duckduckgo',
                              teams,
                              orgToken: process.env.ORG_TOKEN || undefined
                          });
                      } catch (error) {
                          const msg = error.status === 401
                              ? 'DAX_PAT returned 401 — token may be expired or misconfigured'
                              : `Review validation failed: ${error.message} (status: ${error.status ?? 'unknown'})`;
                          core.setFailed(msg);
                          return;
                      }

                      if (approval) {
                          const via = approval.team ? `(member of ${approval.team})` : '';
                          await core.summary
                              .addHeading('Review Validation', 3)
                              .addRaw(`✅ Approved by ${approval.user} ${via}`.trim())
                              .write();
                          core.info(`✅ Approved by ${approval.user} ${via}`);
                      } else if (context.eventName === 'pull_request_target') {
                          await core.summary
                              .addHeading('Review Validation', 3)
                              .addRaw(`⏳ Waiting for approval from an authorized reviewer.\n\nRequired teams: ${teamsList}`)
                              .write();
                          core.setFailed(`Waiting for approval. Required teams: ${teamsList}`);
                      } else {
                          const msg = `No approved review from daxtheduck or a member of: ${teamsList}`;
                          await core.summary
                              .addHeading('Review Validation', 3)
                              .addRaw(`❌ ${msg}`)
                              .write();
                          core.setFailed(msg);
                      }
