name: Review Validation

on:
    pull_request_review:
        types: [submitted, dismissed]
    pull_request:
        types: [opened, synchronize, reopened]
    merge_group:

permissions:
    contents: read
    pull-requests: read
    statuses: write

jobs:
    review_validation:
        runs-on: ubuntu-latest

        steps:
            - name: Merge queue pass-through
              if: ${{ github.event_name == 'merge_group' }}
              run: echo "Review already validated before entering merge queue"

            - name: Checkout base branch
              if: ${{ github.event_name != 'merge_group' }}
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.base.ref }}
                  sparse-checkout: |
                      .github/REQUIRED_TEAMS
                      .github/scripts
                  sparse-checkout-cone-mode: false

            - name: Validate referenced PR base targeting
              if: ${{ github.event_name != 'merge_group' }}
              uses: actions/github-script@v8
              with:
                  script: |
                      const pr = context.payload.pull_request;
                      const text = `${pr.title ?? ''}\n${pr.body ?? ''}`;
                      const refs = [...text.matchAll(/\bPR\s*#(\d+)\b/gi)];
                      if (!refs.length) {
                          core.info('No referenced PR detected in title/body.');
                          return;
                      }

                      const referencedPrNumber = Number(refs[0][1]);
                      if (!Number.isInteger(referencedPrNumber)) {
                          core.info('Referenced PR match was not a valid integer.');
                          return;
                      }

                      const { data: referencedPr } = await github.rest.pulls.get({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: referencedPrNumber
                      });

                      if (referencedPr.state !== 'open') {
                          core.info(`Referenced PR #${referencedPrNumber} is not open; skipping base-branch enforcement.`);
                          return;
                      }

                      const expectedBaseRef = referencedPr.head.ref;
                      const actualBaseRef = pr.base.ref;

                      if (actualBaseRef !== expectedBaseRef) {
                          core.setFailed(
                              `PR references #${referencedPrNumber} but targets '${actualBaseRef}'. ` +
                              `Retarget to '${expectedBaseRef}' so fixes stack onto the PR being fixed.`
                          );
                          return;
                      }

                      core.info(`Referenced PR base targeting is valid: '${actualBaseRef}'.`);

            - name: Validate approved review from authorized reviewer
              if: ${{ github.event_name != 'merge_group' }}
              uses: actions/github-script@v8
              env:
                  ORG_TOKEN: ${{ secrets.DAX_PAT }}
              with:
                  script: |
                      const { loadRequiredTeams, findAuthorizedApproval } = await import(`${process.cwd()}/.github/scripts/review-helpers.mjs`);
                      const teams = loadRequiredTeams();
                      const sha = context.payload.pull_request.head.sha;
                      const repo = { owner: context.repo.owner, repo: context.repo.repo };
                      const teamsList = teams.map(t => `@duckduckgo/${t}`).join(', ');

                      async function setReviewStatus({ state, description }) {
                          await github.rest.repos.createCommitStatus({
                              ...repo,
                              sha,
                              state,
                              context: 'Authorized Review',
                              description: description.substring(0, 140)
                          });
                      }

                      let approval;
                      try {
                          approval = await findAuthorizedApproval(github, {
                              ...repo,
                              prNumber: context.payload.pull_request.number,
                              org: 'duckduckgo',
                              teams,
                              orgToken: process.env.ORG_TOKEN || undefined
                          });
                      } catch (error) {
                          const msg = error.status === 401
                              ? 'DAX_PAT returned 401 — token may be expired or misconfigured'
                              : `Review validation failed: ${error.message} (status: ${error.status ?? 'unknown'})`;
                          await setReviewStatus({ state: 'error', description: msg });
                          core.setFailed(msg);
                          return;
                      }

                      if (approval) {
                          const via = approval.team ? `(member of ${approval.team})` : '';
                          const desc = `Approved by ${approval.user} ${via}`.trim();
                          await setReviewStatus({ state: 'success', description: desc });
                          core.info(`✅ ${desc}`);
                      } else {
                          await setReviewStatus({
                              state: 'pending',
                              description: `Waiting for approval. Required teams: ${teamsList}`
                          });
                          core.info('⏳ No approval yet — commit status set to pending');
                      }
