name: Review Validation

on:
    pull_request_review:
        types: [submitted, dismissed]
    pull_request_target:
        types: [opened, synchronize, reopened]

jobs:
    review_validation:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout base branch
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.base.ref }}
                  sparse-checkout: |
                      .github/REQUIRED_TEAMS
                      .github/scripts
                  sparse-checkout-cone-mode: false

            - name: Validate approved review from authorized reviewer
              uses: actions/github-script@v8
              with:
                  github-token: ${{ secrets.DAX_PAT }}
                  script: |
                      const { loadRequiredTeams, findAuthorizedApproval } = require('./.github/scripts/review-helpers.js');
                      const teams = loadRequiredTeams();

                      const approval = await findAuthorizedApproval(github, {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          prNumber: context.payload.pull_request.number,
                          org: 'duckduckgo',
                          teams
                      });

                      if (approval) {
                          const via = approval.team ? `(member of ${approval.team})` : '';
                          console.log(`✅ Approved by ${approval.user} ${via}`);
                      } else {
                          core.setFailed(
                              '❌ No approved review from daxtheduck or a member of the required teams: ' +
                              teams.map(t => `@duckduckgo/${t}`).join(', ')
                          );
                      }
