version: 2
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'daily'
      cooldown:
          default-days: 14
      target-branch: 'main'
      open-pull-requests-limit: 20
      labels:
          - 'dependencies'
      ignore:
          # Git-tag semver comparison can propose downgrades (e.g. v0.30.0 -> v0.29.0).
          - dependency-name: '@duckduckgo/design-tokens'
            versions: ['< 0.30.0']
      groups:
          eslint:
              patterns:
                  - 'eslint*'
                  - '@typescript-eslint*'
          stylelint:
              patterns:
                  - 'stylelint*'
          typescript:
              patterns:
                  - 'typedoc'
                  - 'typescript'
                  - '@types/*'
                  - '@typescript-eslint*'
          rollup:
              patterns:
                  - '@rollup/*'
                  - 'rollup-*'
                  - 'rollup'
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
      target-branch: 'main'
      labels:
          - 'dependencies'
