/* shared/components/Text/Text.module.css */
a {
  color: (--ddg-color-primary);
}
.Text_title-1 {
  font-size: calc(22 * var(--px-in-rem));
  line-height: calc(26 * var(--px-in-rem));
  letter-spacing: calc(-0.26 * var(--px-in-rem));
}
.Text_title-2 {
  font-size: calc(17 * var(--px-in-rem));
  font-weight: 600;
  line-height: calc(22 * var(--px-in-rem));
  letter-spacing: calc(-0.43 * var(--px-in-rem));
}
.Text_headline {
  font-size: calc(13 * var(--px-in-rem));
  font-weight: 600;
  line-height: calc(16 * var(--px-in-rem));
  letter-spacing: calc(-0.08 * var(--px-in-rem));
}
.Text_subheadline {
  font-size: calc(11 * var(--px-in-rem));
  line-height: calc(14 * var(--px-in-rem));
  letter-spacing: calc(0.06 * var(--px-in-rem));
}
.Text_body {
  font-size: calc(13 * var(--px-in-rem));
  line-height: calc(16 * var(--px-in-rem));
  letter-spacing: calc(-0.08 * var(--px-in-rem));
}
.Text_body-emphasis {
  font-size: calc(13 * var(--px-in-rem));
  font-weight: 600;
  line-height: calc(16 * var(--px-in-rem));
  letter-spacing: calc(-0.08 * var(--px-in-rem));
}
.Text_label-small {
  font-size: calc(11 * var(--px-in-rem));
  line-height: calc(11 * var(--px-in-rem));
  letter-spacing: calc(0.06 * var(--px-in-rem));
}
.Text_label-default {
  font-size: calc(13 * var(--px-in-rem));
  line-height: calc(13 * var(--px-in-rem));
  letter-spacing: calc(-0.08 * var(--px-in-rem));
}
.Text_label-medium {
  font-size: calc(13 * var(--px-in-rem));
  font-weight: 500;
  line-height: calc(13 * var(--px-in-rem));
  letter-spacing: calc(-0.25 * var(--px-in-rem));
}
.Text_caption-2-emphasis {
  font-size: calc(10 * var(--px-in-rem));
  line-height: calc(13 * var(--px-in-rem));
  letter-spacing: calc(0.12 * var(--px-in-rem));
}

/* shared/components/Card/Card.module.css */
.Card_card {
  background: var(--color-black-at-1);
  border: 1px solid var(--color-black-at-9);
  border-radius: var(--sp-3);
  padding: var(--sp-6) var(--sp-6) var(--sp-8);
  @media (prefers-color-scheme: dark) {
    background: var(--color-white-at-3);
    border-color: var(--color-white-at-9);
  }
}

/* shared/components/Button/Button.module.css */
.Button_button {
  appearance: none;
  cursor: pointer;
}
.Button_apple {
  background-blend-mode:
    normal,
    color-burn,
    normal;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 100%),
    linear-gradient(180deg, rgba(0, 0, 0, 0.00) 0%, rgba(0, 0, 0, 0.06) 100%),
    #007aff;
  border-radius: var(--sp-2);
  border: 1px solid rgba(40, 145, 255, 0.05);
  box-shadow: 0px 0px 1px 0px rgba(40, 145, 255, 0.05), 0px 1px 1px 0px rgba(40, 145, 255, 0.10);
  color: white;
  font-size: 0.8125rem;
  font-weight: 600;
  line-height: var(--sp-8);
  padding: 0 var(--sp-4);
  &:hover {
    background: linear-gradient(0deg, rgba(255, 255, 255, 0.00) 0%, rgba(255, 255, 255, 0.16) 100%), #2749db;
  }
  &:active {
    background: linear-gradient(0deg, rgba(255, 255, 255, 0.00) 0%, rgba(255, 255, 255, 0.16) 100%), #1743d1;
  }
}

/* pages/release-notes/app/components/ContentPlaceholder.module.css */
.ContentPlaceholder_contentPlaceholder {
  & h2,
  & p {
    background: var(--color-black-at-6);
    @media (prefers-color-scheme: dark) {
      background: var(--color-white-at-6);
    }
  }
  h2 {
    border-radius: var(--sp-3);
    height: var(--sp-6);
    width: 75%;
  }
  p {
    border-radius: var(--sp-2);
    height: var(--sp-4);
    margin-top: var(--sp-2);
    width: 50%;
  }
  ul {
    margin-top: var(--sp-6);
  }
  li {
    margin-top: var(--sp-4);
    padding-left: var(--sp-5);
    position: relative;
    padding-left: var(--sp-6);
    &::before {
      background: var(--color-black-at-6);
      border-radius: 0.375rem;
      content: "";
      display: inline-block;
      width: var(--sp-3);
      height: var(--sp-3);
      position: absolute;
      top: 0.125rem;
      left: 0;
    }
    @media (prefers-color-scheme: dark) {
      &::before {
        background: var(--color-white-at-6);
      }
    }
    p {
      width: 100%;
      &:last-child {
        width: 50%;
      }
    }
  }
}

/* pages/release-notes/app/components/ReleaseNotes.module.css */
:root {
  --bullet-color: rgba(57, 105, 239, 0.24);
  --sp-4_5: calc(18 * var(--px-in-rem));
  --sp-2_5: calc(10 * var(--px-in-rem));
  --sp-1_5: calc(6 * var(--px-in-rem));
  @media (prefers-color-scheme: dark) {
    --bullet-color: var(--color-blue-20);
  }
}
.ReleaseNotes_article {
  margin: 0 auto;
  width: 100%;
  display: grid;
  gap: var(--sp-9);
  padding-top: var(--sp-6);
}
.ReleaseNotes_heading {
  display: grid;
  width: 100%;
  gap: var(--sp-2);
}
.ReleaseNotes_card {
  display: grid;
  width: 100%;
  gap: var(--sp-6);
}
.ReleaseNotes_title {
  font-size: calc(50 * var(--px-in-rem));
  font-weight: 800;
  line-height: normal;
}
.ReleaseNotes_statusContainer {
  display: grid;
  width: 100%;
  gap: var(--sp-1) var(--sp-2);
