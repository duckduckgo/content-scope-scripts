<!DOCTYPE html>
<html lang="en">
<head>
    <title>Error</title>
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            /* Token is replaced by native browser so background isn't white while Special Error initializes */
            --loading-color: $LOADING_COLOR$;
            background: var(--loading-color);
        }
    </style>
    <script>
"use strict";
(() => {
  // pages/special-error/src/inline.js
  var param = new URLSearchParams(window.location.search).get("injectName");
  if (isAllowed(param)) {
    document.documentElement.dataset.platform = String(param);
  } else {
    document.documentElement.dataset.platform = "windows";
  }
  function isAllowed(input) {
    const allowed = ["windows", "apple", "integration"];
    return allowed.includes(input);
  }
})();

</script>
